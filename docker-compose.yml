services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      EXPIRY_WARNING_DAYS: "30"
      LOG_LEVEL: "INFO"
      # REFERENCE_TIME: "2026-07-14T00:00:00+00:00"  # uncomment to pin "now" to the fixture generator's baked reference time
      CORS_ORIGINS: "http://localhost:8080"
    volumes:
      - ./backend/fixtures:/app/fixtures:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
